<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script>
/* ================================================================
   CHAIN CONFIG — ARC TESTNET (L1) with multiple RPCs
================================================================ */
const ARC_CHAIN_ID = '0x4cef52';
const ARC_RPCS = [
  'https://rpc.testnet.arc.network',
  'https://rpc.blockdaemon.testnet.arc.network',
  'https://rpc.drpc.testnet.arc.network',
  'https://rpc.quicknode.testnet.arc.network'
];
const ARC_EXPLORER = 'https://testnet.arcscan.app';

/* ================================================================
   10 CONTRACTS (unchanged)
================================================================ */
const CONTRACTS = [ /* ... your exact CONTRACTS array ... */ ];

/* ================================================================
   STATE + PRE-COMPILED CACHE (NEW FOR SPEED)
================================================================ */
let walletConnected = false;
let currentAccount  = null;
let provider        = null;
let signer_         = null;
let solcReady       = false;
let solcWorker      = null;
let deployedCount   = 0;
let compiledCache   = {};   // ← NEW: bytecode + abi cache

/* ================================================================
   ... (keep your initDevBackground, loadSolc, compileSol, connectWallet, 
        switchToArc, setStatus, enableAllButtons, highlight, render functions 
        exactly as they were — only deploy() changes below) ...
================================================================ */

/* ================================================================
   OPTIMIZED DEPLOY (pre-compiled + faster UI)
================================================================ */
async function deploy(id) {
  const c = CONTRACTS.find(x => x.id === id);
  if (!c) return;

  if (!walletConnected) {
    const ok = await connectWallet();
    if (!ok) return;
  }

  if (!solcReady) {
    setStatus(id, 'pend', '⚠ Compiler still loading — please wait…');
    return;
  }

  const card = document.getElementById('card-' + id);
  const btn  = document.getElementById('btn-' + id);

  card.classList.add('deploying');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin">↻</span> Deploying…';

  try {
    // Use cached compilation (instant after first load)
    let compilation = compiledCache[c.id];
    if (!compilation) {
      setStatus(id, 'pend', '↻ Compiling…');
      compilation = await compileSol(c.src, c.contractName);
      compiledCache[c.id] = compilation;   // cache for next time
    }

    const args = [];
    for (const inp of c.inputs) {
      const el = document.getElementById(id + '-' + inp.id);
      let val = el ? el.value.trim() : inp.def;
      if (!val) throw new Error(`Fill in: ${inp.label}`);
      if (inp.id === 'tsupply') {
        val = ethers.BigNumber.from(val);   // safer
      }
      args.push(val);
    }

    btn.innerHTML = '<span class="spin">↻</span> Waiting for MetaMask…';
    setStatus(id, 'pend', '⏳ Sign the transaction in MetaMask…');

    const factory  = new ethers.ContractFactory(compilation.abi, compilation.bytecode, signer_);
    const instance = await factory.deploy(...args);

    const txHash = instance.deployTransaction.hash;
    setStatus(id, 'pend', `⟳ Tx: ${txHash.slice(0,14)}…`);

    await instance.deployed();
    const address = instance.address;

    // Success UI
    card.classList.remove('deploying');
    card.classList.add('deployed');
    btn.classList.add('done');
    btn.innerHTML = '✓ Deployed!';
    btn.disabled = true;

    const badge = card.querySelector('.cbadge');
    badge.classList.add('ok');
    badge.textContent = '✓ Deployed';

    deployedCount++;
    document.getElementById('deployedCount').textContent = `${deployedCount} / 10 deployed`;

    setStatus(id, 'ok', null, address, txHash);

  } catch (err) {
    card.classList.remove('deploying');
    btn.disabled = false;
    btn.innerHTML = '↻ Retry';

    let msg = err.message || String(err);
    if (err.code === 4001 || msg.includes('user rejected') || msg.includes('User denied')) msg = 'Transaction rejected by user.';
    else if (msg.length > 130) msg = msg.slice(0, 130) + '…';
    setStatus(id, 'fail', '✗ ' + msg);
  }
}

/* ================================================================
   INIT — now pre-compiles everything for speed
================================================================ */
async function init() {
  initDevBackground();
  render();

  const statusEl  = document.getElementById('compilerStatus');
  const statusTxt = document.getElementById('statusText');

  try {
    await loadSolc();
    statusEl.className = 'ready';
    statusTxt.textContent = '✓ Solidity v0.8.20 ready — pre-compiling contracts…';

    // PRE-COMPILE ALL CONTRACTS (makes every deploy instant)
    for (const c of CONTRACTS) {
      try {
        const comp = await compileSol(c.src, c.contractName);
        compiledCache[c.id] = comp;
      } catch (e) { console.warn('Pre-compile failed for', c.id, e); }
    }

    statusTxt.textContent = '🚀 All contracts pre-compiled — connect wallet and deploy instantly!';
    enableAllButtons();

    // Auto-reconnect if wallet already connected
    if (window.ethereum) {
      const accs = await window.ethereum.request({ method: 'eth_accounts' }).catch(() => []);
      if (accs.length) connectWallet();
    }
  } catch (err) {
    statusEl.className = 'err';
    statusTxt.textContent = '✗ Compiler failed: ' + err.message;
  }
}

init();
</script>
